---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: ublue-niri
base-image: ghcr.io/ublue-os/base-main
description: Atomic distro with the Niri and noctalia shell using bluebuild
image-version: latest 

modules:
  - type: files
    files:
      - source: system
        destination: / 

  - type: dnf
    repos:
      copr:
        - bieszczaders/kernel-cachyos
        - bieszczaders/kernel-cachyos-addons
    install:
      packages:
        - scx-scheds
        - scx-tools
        - scx-manager
        - sbsigntools
    replace:
      - from-repo: copr:copr.fedorainfracloud.org:bieszczaders:kernel-cachyos-addons
        packages:
          - old: zram-generator-defaults
            new: cachyos-settings
  
  - type: custom-kernel
    kernel: cachyos-lto
    initramfs: true
    source: local
    nvidia: false
    sign:
      key: /tmp/certs/MOK.key
      cert: /usr/share/cert/MOK.pem
      mok-password: kansolinux
    secrets:
      - type: file
        source: ./MOK.key
        mount:
          type: file
          destination: /tmp/certs/MOK.key


  - type: brew
    nofile-limits: true
    brew-analytics: false
    # direct-pull: true

  - type: script
    snippets:
      -  brew install Valkyrie00/homebrew-bbrew/bbrew
    scripts:
      - misc.sh

  - type: fonts
    fonts:
      nerd-fonts:
        - JetBrainsMono

  - type: gschema-overrides
    include:
      - zz-ublue-niri.gschema.override

  - type: justfiles
    validate: true
    install: true

  - type: chezmoi
    repository: "https://github.com/Vorxiu/niri-dots" 
    all-users: true
    file-conflict-policy: skip

  - type: dnf
    repos:
      cleanup: true
      copr:
        - ublue-os/packages
      nonfree: rpmfusion
    install:
      # allow-erasing: true
      exclude:
        - alacritty
        - waybar
        - mako
        - breeze-icon-theme
      packages:
        - adw-gtk3-theme
        - bazaar
        - btop
        - bat
        - bluez-tools
        - distrobox
        - eza
        - fd-find
        - fzf
        - firewall-config
        - fuse-overlayfs
        - fprintd
        - fprintd-pam
        - fastfetch
        - git
        - gnome-keyring
        - gvfs
        - gvfs-mtp
        - gvfs-fuse
        - gvfs-archive
        - gvfs-nfs
        - gvfs-smb
        - kitty
        - nautilus
        - noctalia-shell
        - blueman-nautilus
        - cage
        - greetd
        - gtkgreet
        - greetd-selinux
        - nautilus-python
        - NetworkManager-openvpn
        - niri
        # - papirus-icon-theme
        - nwg-look
        - polkit
        - mate-polkit
        - podman-compose
        - qt6ct
        - qt6-qttools
        - qt6-qtwayland
        - tldr
        - tuned-ppd
        - ublue-os-just
        - uupd
        - wtype
        - wl-mirror
        - wireguard-tools
        - xdg-desktop-portal-gnome
        - xdg-desktop-portal-gtk
        - xwayland-satellite
        - zoxide
        - zsh
        - zstd
    remove:
      auto-remove: true
      packages:
        - weston
        - firefox
        - firefox-langpacks
        - breeze-icon-theme
        - waybar
        - nvtop
        - htop
        - mako
        - swaybg
        - swaylock
        - swayidle
        
  - type: systemd
    system:
      enabled:
        - podman.socket
        - greetd.service
        - uupd.timer
    user:
      enabled:
        - gnome-keyring-daemon.socket
        - polkit-mate.service
      disabled:
        - waybar.service
        - mako.service

  - type: os-release
    properties:
      ID: Kanso
      NAME: Kanso Linux
      PRETTY_NAME: Kanso Linux
      ID_LIKE: fedora
      DEFAULT_HOSTNAME: kanso-linux
    
  - type: yafti

  - type: signing
