---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: ublue-niri
# description will be included in the image's metadata
description: minimal niri on ublue

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/ublue-os/base-main
image-version: latest # latest is also supported if you want new updates ASAP

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /

  - type: brew
    nofile-limits: true # increase nofile limits
    brew-analytics: false # disable telemetry
    direct-pull: true

  - type: fonts
    fonts:
      nerd-fonts:
        - JetBrainsMono

  - type: gschema-overrides
    include:
      - zz-ublue-niri.gschema.override

  - type: dnf
    repos:
      cleanup: true
      copr:
        - ublue-os/packages
        - solopasha/hyprland
        - bieszczaders/kernel-cachyos-addons
        # - avengemedia/dms
      nonfree: rpmfusion

    install:
      allow-erasing: true
      exclude:
        - alacritty
        - waybar
        - mako
        
      packages:
        - adw-gtk3-theme
        - ananicy-cpp
        - cachyos-ananicy-rules
        - bazaar
        - btop
        - bluez-tools
        - distrobox
        - podman
        - fd-find
        - fzf
        - firewall-config
        - fuse-overlayfs
        - fprintd
        - fprintd-pam
        - fastfetch
        - git
        - gnome-keyring
        - gvfs
        - gvfs-mtp
        - gvfs-fuse
        - gvfs-archive
        - gvfs-obexftp
        - gvfs-nfs
        - gvfs-smb
        - kitty
        - man-db
        - nautilus
        # - blueman-nautilus
        - nautilus-sendto
        - noctalia-shell
        - lightdm-gtk
        - nautilus-python
        - sushi
        - NetworkManager-openvpn
        - niri
        - papirus-icon-theme
        # - nwg-look
        - polkit
        - mate-polkit
        - podman-compose
        - qt6ct
        - qt6-qttools
        - qt6-qtwayland
        - tldr
        - tuned-ppd
        - toolbox
        - upower
        - uupd
        - uwsm
        - wtype
        - wl-mirror
        - wireguard-tools
        - xdg-desktop-portal-gnome
        - xdg-desktop-portal-gtk
        - xwayland-satellite
        - zoxide
        - zsh
        - zstd

    remove:
      auto-remove: true
      packages:
        - weston
        - firefox
        - firefox-langpacks
        - breeze-icon-theme
        - waybar
        - nvtop
        - htop
        - mako

  - type: systemd
    system:
      enabled:
        - podman.socket
        - lightdm.service
        - ananicy-cpp.service
        - uupd.timer

    user:
      enabled:
        - gnome-keyring-daemon.socket
        - polkit-mate.service
      disabled:
        - waybar.service
        - mako.service

  - type: os-release
    properties:
      ID: Kanso
      NAME: Kanso Linux
      PRETTY_NAME: Kanso Linux
      ID_LIKE: fedora
      DEFAULT_HOSTNAME: kanso-linux

  - type: signing
