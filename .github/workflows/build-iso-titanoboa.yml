name: build-iso-titanoboa
on:
  workflow_dispatch: 
  schedule:
    - cron:
        "00 08 1 * *" # build at 08:00 UTC on the first day of every month
env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-iso:
    name: Build ISO
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@v9

      - name: Install bluebuild cli
        run: bash <(curl -s https://raw.githubusercontent.com/blue-build/cli/main/install.sh)

      - name: set release date
        run: |
          echo "RELEASE_DATE=$(date --rfc-3339=date)" >> ${GITHUB_ENV}
      
      - name: Build ISO
        id: build
        uses: ublue-os/titanoboa@main
        with:
          image-ref: ghcr.io/ublue-os/bluefin-dx:gts
          flatpaks-list: ${{ github.workspace }}/flatpaks/system-flatpaks.list
          hook-post-rootfs: ${{ github.workspace }}/iso_files/configure_iso_anaconda.sh
          kargs: ""
          builder-distro: fedora

      - name: Rename and Checksum ISO
        run: |
          mkdir -p output
          mv ${{ steps.build.outputs.iso-dest }} output/my-custom-image.iso
          (cd output && sha256sum my-custom-image.iso | tee my-custom-image.iso-CHECKSUM)

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v7
        with:
          name: kansoLinux-${{ env.RELEASE_DATE }}-iso
          path: output/*.iso
          if-no-files-found: error
          retention-days: 60
          archive: false

      - name: Upload checksum as artifact
        uses: actions/upload-artifact@v7
        with:
          name: kansoLinux-${{ env.RELEASE_DATE }}-checksum
          path: output/*-CHECKSUM
          if-no-files-found: error
          retention-days: 60
          archive: false
